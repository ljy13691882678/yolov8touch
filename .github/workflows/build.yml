name: Build yolov8touch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "NDK_DIR=$(pwd)/android-ndk-r27c" >> $GITHUB_ENV

      - name: Clone YoloTouchHelp (for real libtensorflowlite_jni.so)
        run: |
          git clone https://github.com/ljy13691882678/YoloTouchHelp.git ../YoloTouchHelp --depth 1
          ls -lh ../YoloTouchHelp/app/src/main/cpp/lib/libtensorflowlite_jni.so

      - name: Create stub system libs
        run: |
          CC="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang"
          mkdir -p stub_libs
          echo "void __stub() {}" > /tmp/stub.c
          for lib in gui ui binder utils; do
            $CC -shared -o stub_libs/lib${lib}.so /tmp/stub.c -Wl,-soname,lib${lib}.so
          done
          # Use real TFLite .so from YoloTouchHelp
          cp ../YoloTouchHelp/app/src/main/cpp/lib/libtensorflowlite_jni.so stub_libs/
          echo "STUB_LIBS_DIR=$(pwd)/stub_libs" >> $GITHUB_ENV

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_DIR/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTUB_LIBS_DIR="$STUB_LIBS_DIR"
          make -j$(nproc) 2>&1 | tail -20
          ls -lh yolov8touch

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: yolov8touch-arm64
          path: |
            build/yolov8touch
            stub_libs/libtensorflowlite_jni.so